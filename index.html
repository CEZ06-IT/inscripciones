<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inscripciones Aprendamos en Comunidad</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .hero::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('images/bg.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px); /* Ajusta la intensidad del blur */
    transform: scale(1.1); /* Evita bordes duros del blur */
    z-index: -1;
  }

  .hero-overlay {
    background-color: rgba(0,0,0,0.4);
    padding: 40px;
    border-radius: 10px;
    z-index: 1;
  }
</style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-overlay text-center">
          <img src="images/Escudo-solo-CEZ.png" alt="Logo CEZ" class="img-fluid mb-3" style="max-width:300px;">
      <h1 class="display-3 fw-bold">Aprendamos en Comunidad 2026.</h1>
      <p class="lead mb-4">Padres de familia, completen el formulario y aseguren su lugar en las actividades.</p>
      <a href="#formulario" class="btn btn-lg btn-warning">Inscríbete</a>
    </div>
  </section>

  <!-- Aquí seguiría tu navbar, contenido y formulario -->
  <div class="container py-5" id="formulario">
    <div class="card shadow">
      <div class="card-body">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdFQ2GRtQcIKNR3PetKhquuh2Fn5iEJ6ZLHNG_4Z3rq0rdh3w/viewform?embedded=true" 
                width="100%" height="1182" frameborder="0" marginheight="0" marginwidth="0">
          Cargando…
        </iframe>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
